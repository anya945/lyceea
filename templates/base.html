{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Lyceea Botanical Candle ร้านเทียนหอมและผลิตภัณฑ์สร้างบรรยากาศสำหรับบ้าน"
    >

    <title>
        {% block title %}
            Lyceea | Luxury Candle
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >
    <link
    rel="stylesheet"
    href="{% static 'css/accounts.css' %}"
    >

    {% block extra_css %}
    {% endblock %}
</head>

<body>

    {% include "includes/announcement.html" %}
    {% include "includes/navbar.html" %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include "includes/footer.html" %}

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    {% block extra_js %}
    {% endblock %}

</body>
</html>
